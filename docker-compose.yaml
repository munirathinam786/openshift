# Legacy compose filename retained for compatibility.
# Preferred local workflow uses Podman with ./compose.yaml:
#   podman compose up -d --build

services:
  terraform-iac-docs:
    restart: always
    image: "localhost/terraform-iac-docs:local.1.0.0"
    build:
      context: ./
      dockerfile: ./Containerfile
    hostname: terraform-iac-docs
    container_name: terraform-iac-docs
    tty: true
    volumes:
      - ./:/docs:Z
    ports:
      - "8000:8000"
