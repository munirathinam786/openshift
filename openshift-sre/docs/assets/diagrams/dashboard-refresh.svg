<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="dashboardRefreshTitle dashboardRefreshDesc">
  <title id="dashboardRefreshTitle">Dashboard refresh flow</title>
  <desc id="dashboardRefreshDesc">Diagram showing the browser dashboard posting to chat, then loading history overview to render summary cards, trend charts, and recent runs from persisted metrics.</desc>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      .box { rx: 18; ry: 18; stroke-width: 2; }
      .label { font: 600 18px Inter, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .edge { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow2); }
      .dash { stroke-dasharray: 8 6; }
    </style>
  </defs>
  <rect x="60" y="220" width="220" height="82" class="box" fill="#dae8fc" stroke="#6c8ebf" />
  <text x="170" y="252" class="label">Browser dashboard</text>
  <text x="170" y="276" class="small">Console + historical widgets</text>

  <rect x="350" y="110" width="190" height="78" class="box" fill="#d5e8d4" stroke="#82b366" />
  <text x="445" y="142" class="label">POST /chat</text>
  <text x="445" y="166" class="small">Agent response + run_id</text>

  <rect x="350" y="335" width="240" height="78" class="box" fill="#d5e8d4" stroke="#82b366" />
  <text x="470" y="367" class="label">GET /history/overview</text>
  <text x="470" y="391" class="small">Latest runs and trend series</text>

  <rect x="700" y="220" width="240" height="82" class="box" fill="#e1d5e7" stroke="#9673a6" />
  <text x="820" y="252" class="label">Persisted runs + metrics</text>
  <text x="820" y="276" class="small">MariaDB-backed history</text>

  <rect x="1010" y="220" width="250" height="82" class="box" fill="#fff2cc" stroke="#d6b656" />
  <text x="1135" y="248" class="label">Historical widgets</text>
  <text x="1135" y="272" class="small">Cards, charts, recent runs</text>

  <path d="M 280 240 L 350 150" class="edge" />
  <path d="M 280 282 L 350 374" class="edge" />
  <path d="M 540 150 L 700 240" class="edge" />
  <path d="M 590 374 L 700 282" class="edge" />
  <path d="M 940 261 L 1010 261" class="edge" />
  <path d="M 1135 302 C 1135 455, 170 455, 170 302" class="edge dash" />
</svg>
