# Project information
site_name: Terraform IaC for OpenShift Multi Cluster AirGapped
site_url: https://example.com/terraform-iac/
site_author: Sathishkumar Munirathinam (sathishkumar.munirathinam@kyndryl.com)
site_description: >-
  Terraform Infrastructure as Code documentation for deploying multi-cluster
  OpenShift environments on bare metal in air-gapped mode with GPU support,
  disaster recovery, and centralized management.

# Copyright
copyright: >-
  Copyright &copy; 2026 — Terraform IaC for OpenShift Multi Cluster AirGapped<br/>
  <strong>Author:</strong> Sathishkumar Munirathinam &nbsp;|&nbsp;
  <a href="mailto:sathishkumar.munirathinam@kyndryl.com">sathishkumar.munirathinam@kyndryl.com</a>

theme:
  icon:
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  name: material
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.integrate
  palette:
    primary: custom
  font:
    text: Roboto
    code: Roboto Mono

