<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ config.appName }}</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; }
      header { padding: 24px; background: #111827; border-bottom: 1px solid #334155; }
      main { padding: 24px; display: grid; gap: 16px; }
      .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 16px; }
      .muted { color: #94a3b8; }
      pre { white-space: pre-wrap; word-break: break-word; background: #020617; padding: 12px; border-radius: 8px; }
      button { background: #2563eb; color: white; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
    </style>
  </head>
  <body>
    <header>
      <h1>{{ config.appName }}</h1>
      <p class="muted">Lightweight self-contained UI package for Agent Builder pipelines</p>
    </header>
    <main>
      <section class="card">
        <strong>API base URL:</strong> <span id="api-base">{{ config.apiBaseUrl }}</span><br />
        <strong>Rendered at:</strong> <span>{{ timestamp }}</span>
      </section>
      <section class="card">
        <h2>API health</h2>
        <button onclick="loadHealth()">Refresh health</button>
        <pre id="health-output">Click refresh to query the API.</pre>
      </section>
      <section class="card">
        <h2>Registered agents</h2>
        <button onclick="loadAgents()">Load agents</button>
        <pre id="agents-output">Click load to fetch agents.</pre>
      </section>
    </main>
    <script>
      async function fetchJson(path) {
        const base = document.getElementById('api-base').textContent.trim().replace(/\/$/, '');
        const response = await fetch(base + path);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      }
      async function loadHealth() {
        const out = document.getElementById('health-output');
        out.textContent = 'Loading...';
        try {
          out.textContent = JSON.stringify(await fetchJson('/health'), null, 2);
        } catch (error) {
          out.textContent = `Failed to load health: ${error.message}`;
        }
      }
      async function loadAgents() {
        const out = document.getElementById('agents-output');
        out.textContent = 'Loading...';
        try {
          out.textContent = JSON.stringify(await fetchJson('/agents'), null, 2);
        } catch (error) {
          out.textContent = `Failed to load agents: ${error.message}`;
        }
      }
    </script>
  </body>
</html>
