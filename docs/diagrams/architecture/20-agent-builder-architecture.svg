<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 20px; font-weight: bold; fill: #1a1a2e; }
      .layer-label { font-size: 13px; font-weight: bold; }
      .svc-box { rx: 8; ry: 8; }
      .svc-title { font-size: 11px; font-weight: bold; }
      .svc-detail { font-size: 9px; fill: #555; }
      .route-tag { font-size: 9px; fill: #ef6c00; }
      .note { font-size: 10px; fill: #4e342e; }
    </style>
  </defs>

  <!-- Title -->
  <text x="800" y="35" text-anchor="middle" class="title">Kyndryl Agent Builder Factory — OpenShift Baremetal Architecture</text>

  <!-- User Layer -->
  <rect x="40" y="55" width="1520" height="75" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-dasharray="6,3" />
  <text x="55" y="72" class="layer-label" fill="#2e7d32">Users &amp; Clients</text>
  <rect x="80" y="80" width="140" height="40" rx="6" fill="#c8e6c9" stroke="#2e7d32" />
  <text x="150" y="96" text-anchor="middle" class="svc-title">Web Browser</text>
  <text x="150" y="110" text-anchor="middle" class="svc-detail">Agent Builder UI</text>
  <rect x="240" y="80" width="140" height="40" rx="6" fill="#c8e6c9" stroke="#2e7d32" />
  <text x="310" y="96" text-anchor="middle" class="svc-title">CLI</text>
  <text x="310" y="110" text-anchor="middle" class="svc-detail">Agent Builder CLI</text>
  <rect x="400" y="80" width="140" height="40" rx="6" fill="#c8e6c9" stroke="#2e7d32" />
  <text x="470" y="96" text-anchor="middle" class="svc-title">Chat Interface</text>
  <text x="470" y="110" text-anchor="middle" class="svc-detail">AskConsult</text>
  <rect x="560" y="80" width="140" height="40" rx="6" fill="#c8e6c9" stroke="#2e7d32" />
  <text x="630" y="96" text-anchor="middle" class="svc-title">A2A Clients</text>
  <text x="630" y="110" text-anchor="middle" class="svc-detail">Agent-to-Agent</text>
  <rect x="720" y="80" width="140" height="40" rx="6" fill="#c8e6c9" stroke="#2e7d32" />
  <text x="790" y="96" text-anchor="middle" class="svc-title">Temporal UI</text>
  <text x="790" y="110" text-anchor="middle" class="svc-detail">Workflow Monitor</text>

  <!-- OpenShift Routes Layer -->
  <rect x="40" y="150" width="1520" height="55" rx="8" fill="#fff3e0" stroke="#ef6c00" stroke-dasharray="6,3" />
  <text x="55" y="167" class="layer-label" fill="#ef6c00">OpenShift Routes (TLS Edge Termination)</text>
  <rect x="60" y="175" width="115" height="22" rx="4" fill="#ffe0b2" stroke="#ef6c00" />
  <text x="117" y="190" text-anchor="middle" class="route-tag">ui.agent-builder.*</text>
  <rect x="185" y="175" width="120" height="22" rx="4" fill="#ffe0b2" stroke="#ef6c00" />
  <text x="245" y="190" text-anchor="middle" class="route-tag">api.agent-builder.*</text>
  <rect x="315" y="175" width="130" height="22" rx="4" fill="#ffe0b2" stroke="#ef6c00" />
  <text x="380" y="190" text-anchor="middle" class="route-tag">litellm.agent-builder.*</text>
  <rect x="455" y="175" width="140" height="22" rx="4" fill="#ffe0b2" stroke="#ef6c00" />
  <text x="525" y="190" text-anchor="middle" class="route-tag">temporal.agent-builder.*</text>
  <rect x="605" y="175" width="125" height="22" rx="4" fill="#ffe0b2" stroke="#ef6c00" />
  <text x="667" y="190" text-anchor="middle" class="route-tag">tools.agent-builder.*</text>
  <rect x="740" y="175" width="120" height="22" rx="4" fill="#ffe0b2" stroke="#ef6c00" />
  <text x="800" y="190" text-anchor="middle" class="route-tag">a2a.agent-builder.*</text>
  <rect x="870" y="175" width="130" height="22" rx="4" fill="#ffe0b2" stroke="#ef6c00" />
  <text x="935" y="190" text-anchor="middle" class="route-tag">registry.agent-builder.*</text>
  <rect x="1010" y="175" width="130" height="22" rx="4" fill="#ffe0b2" stroke="#ef6c00" />
  <text x="1075" y="190" text-anchor="middle" class="route-tag">deploy.agent-builder.*</text>

  <!-- Application Services Layer -->
  <rect x="40" y="225" width="1520" height="165" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-dasharray="6,3" />
  <text x="55" y="242" class="layer-label" fill="#1565c0">Application Services (Namespace: agent-builder)</text>

  <!-- UI -->
  <rect x="55" y="255" width="145" height="65" rx="6" fill="#bbdefb" stroke="#1565c0" />
  <text x="127" y="273" text-anchor="middle" class="svc-title">Agent Builder UI</text>
  <text x="127" y="287" text-anchor="middle" class="svc-detail">React + Vite</text>
  <text x="127" y="299" text-anchor="middle" class="svc-detail">Port: 3000 | 2 replicas</text>

  <!-- API -->
  <rect x="210" y="255" width="155" height="65" rx="6" fill="#bbdefb" stroke="#1565c0" />
  <text x="287" y="273" text-anchor="middle" class="svc-title">Agent Builder API</text>
  <text x="287" y="287" text-anchor="middle" class="svc-detail">FastAPI + Uvicorn</text>
  <text x="287" y="299" text-anchor="middle" class="svc-detail">Port: 8000 | 2 replicas</text>

  <!-- Tool Catalog -->
  <rect x="375" y="255" width="135" height="65" rx="6" fill="#bbdefb" stroke="#1565c0" />
  <text x="442" y="273" text-anchor="middle" class="svc-title">Tool Catalog</text>
  <text x="442" y="287" text-anchor="middle" class="svc-detail">MCP Server</text>
  <text x="442" y="299" text-anchor="middle" class="svc-detail">Port: 8090</text>

  <!-- A2A Gateway -->
  <rect x="520" y="255" width="135" height="65" rx="6" fill="#bbdefb" stroke="#1565c0" />
  <text x="587" y="273" text-anchor="middle" class="svc-title">A2A Gateway</text>
  <text x="587" y="287" text-anchor="middle" class="svc-detail">Agent-to-Agent</text>
  <text x="587" y="299" text-anchor="middle" class="svc-detail">Port: 8003</text>

  <!-- Agent Registry -->
  <rect x="665" y="255" width="135" height="65" rx="6" fill="#bbdefb" stroke="#1565c0" />
  <text x="732" y="273" text-anchor="middle" class="svc-title">Agent Registry</text>
  <text x="732" y="287" text-anchor="middle" class="svc-detail">Node.js/Express</text>
  <text x="732" y="299" text-anchor="middle" class="svc-detail">Port: 8002</text>

  <!-- Agent Deploy Service -->
  <rect x="810" y="255" width="145" height="65" rx="6" fill="#bbdefb" stroke="#1565c0" />
  <text x="882" y="273" text-anchor="middle" class="svc-title">Agent Deploy Svc</text>
  <text x="882" y="287" text-anchor="middle" class="svc-detail">FastAPI</text>
  <text x="882" y="299" text-anchor="middle" class="svc-detail">Port: 8001</text>

  <!-- Temporal Workers -->
  <rect x="965" y="255" width="155" height="65" rx="6" fill="#bbdefb" stroke="#1565c0" />
  <text x="1042" y="273" text-anchor="middle" class="svc-title">Temporal Workers</text>
  <text x="1042" y="287" text-anchor="middle" class="svc-detail">Python</text>
  <text x="1042" y="299" text-anchor="middle" class="svc-detail">Port: 8000 | 2 replicas</text>

  <!-- Deployed Agents -->
  <rect x="1140" y="255" width="170" height="65" rx="6" fill="#c5cae9" stroke="#283593" stroke-dasharray="4,2" />
  <text x="1225" y="278" text-anchor="middle" class="svc-title" fill="#283593">Deployed Agents</text>
  <text x="1225" y="296" text-anchor="middle" class="svc-detail">(Runtime Pods)</text>

  <!-- Orchestration &amp; LLM Layer -->
  <rect x="40" y="410" width="1520" height="140" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-dasharray="6,3" />
  <text x="55" y="427" class="layer-label" fill="#7b1fa2">Orchestration &amp; LLM Layer</text>

  <!-- Temporal Server -->
  <rect x="55" y="440" width="155" height="65" rx="6" fill="#e1bee7" stroke="#7b1fa2" />
  <text x="132" y="458" text-anchor="middle" class="svc-title">Temporal Server</text>
  <text x="132" y="472" text-anchor="middle" class="svc-detail">v1.28.1</text>
  <text x="132" y="484" text-anchor="middle" class="svc-detail">Port: 7233</text>

  <!-- Temporal UI -->
  <rect x="220" y="440" width="135" height="65" rx="6" fill="#e1bee7" stroke="#7b1fa2" />
  <text x="287" y="458" text-anchor="middle" class="svc-title">Temporal UI</text>
  <text x="287" y="472" text-anchor="middle" class="svc-detail">v2.39.0</text>
  <text x="287" y="484" text-anchor="middle" class="svc-detail">Port: 8080</text>

  <!-- LiteLLM -->
  <rect x="370" y="440" width="175" height="65" rx="6" fill="#e1bee7" stroke="#7b1fa2" />
  <text x="457" y="458" text-anchor="middle" class="svc-title">LiteLLM Proxy</text>
  <text x="457" y="472" text-anchor="middle" class="svc-detail">v1.75.5 | Multi-model Gateway</text>
  <text x="457" y="484" text-anchor="middle" class="svc-detail">Port: 4000</text>

  <!-- Ollama -->
  <rect x="560" y="440" width="160" height="65" rx="6" fill="#f48fb1" stroke="#c2185b" />
  <text x="640" y="455" text-anchor="middle" class="svc-title" fill="#c2185b">Ollama</text>
  <text x="640" y="469" text-anchor="middle" class="svc-detail">Local LLM (Llama3)</text>
  <text x="640" y="481" text-anchor="middle" class="svc-detail">Port: 11434</text>
  <text x="640" y="493" text-anchor="middle" class="svc-detail">GPU Optional</text>

  <!-- External LLM Providers -->
  <rect x="760" y="435" width="500" height="100" rx="8" fill="#fce4ec" stroke="#c62828" stroke-dasharray="4,2" />
  <text x="775" y="452" class="layer-label" fill="#c62828" font-size="11">External LLM Providers (via LiteLLM)</text>
  <rect x="775" y="460" width="95" height="40" rx="4" fill="#ffcdd2" stroke="#c62828" />
  <text x="822" y="476" text-anchor="middle" class="svc-title">OpenAI</text>
  <text x="822" y="490" text-anchor="middle" class="svc-detail">GPT-4o</text>
  <rect x="880" y="460" width="95" height="40" rx="4" fill="#ffcdd2" stroke="#c62828" />
  <text x="927" y="476" text-anchor="middle" class="svc-title">Anthropic</text>
  <text x="927" y="490" text-anchor="middle" class="svc-detail">Claude 3</text>
  <rect x="985" y="460" width="95" height="40" rx="4" fill="#ffcdd2" stroke="#c62828" />
  <text x="1032" y="476" text-anchor="middle" class="svc-title">Azure OpenAI</text>
  <text x="1032" y="490" text-anchor="middle" class="svc-detail">GPT-4o</text>
  <rect x="1090" y="460" width="155" height="55" rx="4" fill="#ffcdd2" stroke="#c62828" />
  <text x="1167" y="476" text-anchor="middle" class="svc-title" fill="#c2185b">Laptop Ollama</text>
  <text x="1167" y="490" text-anchor="middle" class="svc-detail">Llama3 / Mistral</text>
  <text x="1167" y="504" text-anchor="middle" class="svc-detail">(Your Workstation)</text>

  <!-- Data Layer -->
  <rect x="40" y="570" width="1520" height="115" rx="8" fill="#fff8e1" stroke="#f57f17" stroke-dasharray="6,3" />
  <text x="55" y="587" class="layer-label" fill="#f57f17">Data &amp; Persistence Layer (PVCs on ODF/Ceph)</text>

  <!-- PostgreSQL -->
  <rect x="80" y="600" width="210" height="70" rx="6" fill="#fff9c4" stroke="#f57f17" />
  <text x="185" y="618" text-anchor="middle" class="svc-title">PostgreSQL 15</text>
  <text x="185" y="632" text-anchor="middle" class="svc-detail">RHEL9 Image | Port: 5432</text>
  <text x="185" y="644" text-anchor="middle" class="svc-detail">Temporal + LiteLLM + Registry DBs</text>
  <text x="185" y="656" text-anchor="middle" class="svc-detail">50Gi PVC</text>

  <!-- MongoDB -->
  <rect x="340" y="600" width="210" height="70" rx="6" fill="#fff9c4" stroke="#f57f17" />
  <text x="445" y="618" text-anchor="middle" class="svc-title">MongoDB 6</text>
  <text x="445" y="632" text-anchor="middle" class="svc-detail">RHEL9 Image | Port: 27017</text>
  <text x="445" y="644" text-anchor="middle" class="svc-detail">Agent Metadata + Workflows</text>
  <text x="445" y="656" text-anchor="middle" class="svc-detail">50Gi PVC</text>

  <!-- Redis -->
  <rect x="600" y="600" width="210" height="70" rx="6" fill="#fff9c4" stroke="#f57f17" />
  <text x="705" y="618" text-anchor="middle" class="svc-title">Redis 7</text>
  <text x="705" y="632" text-anchor="middle" class="svc-detail">RHEL9 Image | Port: 6379</text>
  <text x="705" y="644" text-anchor="middle" class="svc-detail">LLM Cache + Semantic Cache</text>
  <text x="705" y="656" text-anchor="middle" class="svc-detail">10Gi PVC</text>

  <!-- Ollama PVC -->
  <rect x="860" y="600" width="200" height="70" rx="6" fill="#fff9c4" stroke="#f57f17" />
  <text x="960" y="618" text-anchor="middle" class="svc-title">Ollama Models PVC</text>
  <text x="960" y="632" text-anchor="middle" class="svc-detail">100Gi Storage</text>
  <text x="960" y="644" text-anchor="middle" class="svc-detail">Llama3 Model Data</text>

  <!-- Infrastructure Footer -->
  <rect x="40" y="700" width="1520" height="35" rx="8" fill="#efebe9" stroke="#4e342e" stroke-dasharray="4,2" />
  <text x="800" y="722" text-anchor="middle" class="note">OpenShift Baremetal Cluster | OCP 4.15+ | ODF Storage | GPU Operator (optional) | Terraform IaC via null_resource + SSH remote-exec</text>

  <!-- Connection Lines -->
  <!-- UI -> API -->
  <line x1="200" y1="288" x2="210" y2="288" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow-blue)" />
  <!-- API -> Temporal -->
  <line x1="287" y1="320" x2="132" y2="440" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,2" />
  <!-- API -> LiteLLM -->
  <line x1="340" y1="320" x2="457" y2="440" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,2" />
  <!-- LiteLLM -> Ollama -->
  <line x1="545" y1="472" x2="560" y2="472" stroke="#c2185b" stroke-width="2" />
  <!-- LiteLLM -> External -->
  <line x1="545" y1="472" x2="760" y2="472" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2" />
  <!-- Temporal -> PostgreSQL -->
  <line x1="132" y1="505" x2="185" y2="600" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,2" />
  <!-- API -> MongoDB -->
  <line x1="287" y1="320" x2="445" y2="600" stroke="#f57f17" stroke-width="1" stroke-dasharray="4,2" />
  <!-- LiteLLM -> Redis -->
  <line x1="457" y1="505" x2="705" y2="600" stroke="#f57f17" stroke-width="1" stroke-dasharray="4,2" />
  <!-- Workers -> Temporal -->
  <line x1="1042" y1="320" x2="132" y2="440" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="4,2" />
  <!-- Deploy Svc -> Agents -->
  <line x1="955" y1="288" x2="1140" y2="288" stroke="#283593" stroke-width="1.5" stroke-dasharray="4,2" />

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0" />
    </marker>
  </defs>
</svg>
