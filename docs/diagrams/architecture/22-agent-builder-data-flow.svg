<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: bold; fill: #1a1a2e; }
      .phase-title { font-size: 13px; font-weight: bold; fill: white; }
      .step-text { font-size: 10px; fill: #333; }
      .detail-text { font-size: 9px; fill: #666; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0" />
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef6c00" />
    </marker>
  </defs>

  <text x="700" y="30" text-anchor="middle" class="title">Agent Builder — Data Flow: Agent Creation to Deployment</text>

  <!-- Phase 1: Agent Design -->
  <rect x="30" y="60" width="300" height="200" rx="10" fill="#1565c0" stroke="#0d47a1" stroke-width="2" />
  <text x="180" y="82" text-anchor="middle" class="phase-title">Phase 1: Agent Design</text>
  <rect x="40" y="92" width="280" height="158" rx="6" fill="white" opacity="0.95" />

  <text x="55" y="112" class="step-text" font-weight="bold">1.1 User opens Agent Builder UI</text>
  <text x="65" y="126" class="detail-text">React SPA → ui.agent-builder.* route</text>

  <text x="55" y="146" class="step-text" font-weight="bold">1.2 Define agent configuration</text>
  <text x="65" y="160" class="detail-text">Name, system prompt, tools, model</text>
  <text x="65" y="173" class="detail-text">Select LLM: claude-3, gpt-4o, llama3</text>

  <text x="55" y="193" class="step-text" font-weight="bold">1.3 Add MCP tools</text>
  <text x="65" y="207" class="detail-text">Browse Tool Catalog (port 8090)</text>
  <text x="65" y="220" class="detail-text">Select tools for agent capability</text>

  <text x="55" y="240" class="step-text" font-weight="bold">1.4 Submit agent definition</text>
  <text x="65" y="253" class="detail-text">POST /api/agents → Agent Builder API</text>

  <!-- Arrow 1→2 -->
  <line x1="330" y1="160" x2="380" y2="160" stroke="#1565c0" stroke-width="2" marker-end="url(#arr-blue)" />
  <text x="340" y="152" font-size="8" fill="#1565c0">REST API</text>

  <!-- Phase 2: Agent Processing -->
  <rect x="380" y="60" width="300" height="200" rx="10" fill="#7b1fa2" stroke="#4a148c" stroke-width="2" />
  <text x="530" y="82" text-anchor="middle" class="phase-title">Phase 2: Workflow Orchestration</text>
  <rect x="390" y="92" width="280" height="158" rx="6" fill="white" opacity="0.95" />

  <text x="405" y="112" class="step-text" font-weight="bold">2.1 API stores agent in MongoDB</text>
  <text x="415" y="126" class="detail-text">Agent definition → agent_configs collection</text>

  <text x="405" y="146" class="step-text" font-weight="bold">2.2 API triggers Temporal workflow</text>
  <text x="415" y="160" class="detail-text">Start: agent-build-workflow</text>
  <text x="415" y="173" class="detail-text">Task Queue: workflow-builder-queue</text>

  <text x="405" y="193" class="step-text" font-weight="bold">2.3 Temporal Server delegates</text>
  <text x="415" y="207" class="detail-text">Worker picks up activity tasks</text>
  <text x="415" y="220" class="detail-text">Activities: validate, generate, test</text>

  <text x="405" y="240" class="step-text" font-weight="bold">2.4 Worker calls LiteLLM</text>
  <text x="415" y="253" class="detail-text">LLM generates agent code/config</text>

  <!-- Arrow 2→3 -->
  <line x1="680" y1="160" x2="730" y2="160" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arr)" />
  <text x="688" y="152" font-size="8" fill="#7b1fa2">Build artifacts</text>

  <!-- Phase 3: Agent Build -->
  <rect x="730" y="60" width="300" height="200" rx="10" fill="#ef6c00" stroke="#e65100" stroke-width="2" />
  <text x="880" y="82" text-anchor="middle" class="phase-title">Phase 3: Agent Build &amp; Register</text>
  <rect x="740" y="92" width="280" height="158" rx="6" fill="white" opacity="0.95" />

  <text x="755" y="112" class="step-text" font-weight="bold">3.1 Generate agent container</text>
  <text x="765" y="126" class="detail-text">Dockerfile + requirements.txt + src/</text>

  <text x="755" y="146" class="step-text" font-weight="bold">3.2 Build container image</text>
  <text x="765" y="160" class="detail-text">Agent Deploy Svc triggers OCP build</text>
  <text x="765" y="173" class="detail-text">S2I or Dockerfile strategy</text>

  <text x="755" y="193" class="step-text" font-weight="bold">3.3 Push to internal registry</text>
  <text x="765" y="207" class="detail-text">image-registry.openshift-image-registry.svc</text>

  <text x="755" y="227" class="step-text" font-weight="bold">3.4 Register agent</text>
  <text x="765" y="241" class="detail-text">Agent Registry stores metadata</text>
  <text x="765" y="253" class="detail-text">→ MongoDB + PostgreSQL</text>

  <!-- Arrow 3→4 -->
  <line x1="1030" y1="160" x2="1080" y2="160" stroke="#ef6c00" stroke-width="2" marker-end="url(#arr-orange)" />
  <text x="1038" y="152" font-size="8" fill="#ef6c00">Deploy</text>

  <!-- Phase 4: Agent Deployment -->
  <rect x="1080" y="60" width="290" height="200" rx="10" fill="#2e7d32" stroke="#1b5e20" stroke-width="2" />
  <text x="1225" y="82" text-anchor="middle" class="phase-title">Phase 4: Agent Deployment</text>
  <rect x="1090" y="92" width="270" height="158" rx="6" fill="white" opacity="0.95" />

  <text x="1105" y="112" class="step-text" font-weight="bold">4.1 Deploy agent to OCP</text>
  <text x="1115" y="126" class="detail-text">Agent Deploy Svc creates:</text>
  <text x="1115" y="140" class="detail-text">• Deployment (agent pod)</text>
  <text x="1115" y="153" class="detail-text">• Service (ClusterIP)</text>
  <text x="1115" y="166" class="detail-text">• Route (external access)</text>
  <text x="1115" y="179" class="detail-text">• ConfigMap (agent config)</text>

  <text x="1105" y="199" class="step-text" font-weight="bold">4.2 Agent goes live</text>
  <text x="1115" y="213" class="detail-text">Health check passes</text>
  <text x="1115" y="226" class="detail-text">A2A Gateway discovers agent</text>
  <text x="1115" y="239" class="detail-text">Agent available via API/A2A</text>

  <!-- Phase 5: Runtime - full width bottom -->
  <rect x="30" y="300" width="1340" height="260" rx="10" fill="#00695c" stroke="#004d40" stroke-width="2" />
  <text x="700" y="322" text-anchor="middle" class="phase-title">Phase 5: Agent Runtime &amp; Execution</text>
  <rect x="40" y="332" width="1320" height="218" rx="6" fill="white" opacity="0.95" />

  <!-- Runtime flow boxes -->
  <rect x="60" y="345" width="220" height="85" rx="6" fill="#e8f5e9" stroke="#2e7d32" />
  <text x="170" y="365" text-anchor="middle" class="step-text" font-weight="bold">5.1 User Invokes Agent</text>
  <text x="170" y="382" text-anchor="middle" class="detail-text">Via UI, API, CLI, or A2A Gateway</text>
  <text x="170" y="397" text-anchor="middle" class="detail-text">POST /api/agents/{id}/invoke</text>
  <text x="170" y="412" text-anchor="middle" class="detail-text">or A2A protocol message</text>

  <rect x="310" y="345" width="220" height="85" rx="6" fill="#f3e5f5" stroke="#7b1fa2" />
  <text x="420" y="365" text-anchor="middle" class="step-text" font-weight="bold">5.2 Agent Processes</text>
  <text x="420" y="382" text-anchor="middle" class="detail-text">Agent pod receives request</text>
  <text x="420" y="397" text-anchor="middle" class="detail-text">Calls LiteLLM for LLM inference</text>
  <text x="420" y="412" text-anchor="middle" class="detail-text">Uses configured MCP tools</text>

  <rect x="560" y="345" width="220" height="85" rx="6" fill="#fce4ec" stroke="#c2185b" />
  <text x="670" y="365" text-anchor="middle" class="step-text" font-weight="bold">5.3 LLM Inference</text>
  <text x="670" y="382" text-anchor="middle" class="detail-text">LiteLLM routes to provider:</text>
  <text x="670" y="397" text-anchor="middle" class="detail-text">Cloud API / In-Cluster Ollama</text>
  <text x="670" y="412" text-anchor="middle" class="detail-text">/ Laptop Ollama (Llama3)</text>

  <rect x="810" y="345" width="220" height="85" rx="6" fill="#fff3e0" stroke="#ef6c00" />
  <text x="920" y="365" text-anchor="middle" class="step-text" font-weight="bold">5.4 Tool Execution</text>
  <text x="920" y="382" text-anchor="middle" class="detail-text">MCP tools from Tool Catalog</text>
  <text x="920" y="397" text-anchor="middle" class="detail-text">External APIs, databases, etc.</text>
  <text x="920" y="412" text-anchor="middle" class="detail-text">Results fed back to agent</text>

  <rect x="1060" y="345" width="270" height="85" rx="6" fill="#e3f2fd" stroke="#1565c0" />
  <text x="1195" y="365" text-anchor="middle" class="step-text" font-weight="bold">5.5 Response</text>
  <text x="1195" y="382" text-anchor="middle" class="detail-text">Agent generates response</text>
  <text x="1195" y="397" text-anchor="middle" class="detail-text">Returned to user/caller</text>
  <text x="1195" y="412" text-anchor="middle" class="detail-text">Conversation stored in MongoDB</text>

  <!-- Runtime arrows -->
  <line x1="280" y1="387" x2="310" y2="387" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="530" y1="387" x2="560" y2="387" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="780" y1="387" x2="810" y2="387" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />
  <line x1="1030" y1="387" x2="1060" y2="387" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- Agent-to-Agent communication -->
  <rect x="60" y="450" width="1270" height="90" rx="6" fill="#e8eaf6" stroke="#283593" stroke-dasharray="4,2" />
  <text x="695" y="470" text-anchor="middle" class="step-text" font-weight="bold" fill="#283593">5.6 Agent-to-Agent Communication (A2A Protocol)</text>

  <rect x="80" y="480" width="200" height="48" rx="4" fill="#c5cae9" stroke="#283593" />
  <text x="180" y="500" text-anchor="middle" class="step-text">Agent A</text>
  <text x="180" y="515" text-anchor="middle" class="detail-text">Sends task to Agent B</text>

  <line x1="280" y1="504" x2="380" y2="504" stroke="#283593" stroke-width="2" marker-end="url(#arr)" />
  <text x="320" y="497" font-size="8" fill="#283593">A2A message</text>

  <rect x="380" y="480" width="200" height="48" rx="4" fill="#c5cae9" stroke="#283593" />
  <text x="480" y="500" text-anchor="middle" class="step-text">A2A Gateway :8003</text>
  <text x="480" y="515" text-anchor="middle" class="detail-text">Routes via Agent Registry</text>

  <line x1="580" y1="504" x2="680" y2="504" stroke="#283593" stroke-width="2" marker-end="url(#arr)" />
  <text x="620" y="497" font-size="8" fill="#283593">discover</text>

  <rect x="680" y="480" width="200" height="48" rx="4" fill="#c5cae9" stroke="#283593" />
  <text x="780" y="500" text-anchor="middle" class="step-text">Agent Registry :8002</text>
  <text x="780" y="515" text-anchor="middle" class="detail-text">Resolves agent endpoint</text>

  <line x1="880" y1="504" x2="980" y2="504" stroke="#283593" stroke-width="2" marker-end="url(#arr)" />
  <text x="920" y="497" font-size="8" fill="#283593">invoke</text>

  <rect x="980" y="480" width="200" height="48" rx="4" fill="#c5cae9" stroke="#283593" />
  <text x="1080" y="500" text-anchor="middle" class="step-text">Agent B</text>
  <text x="1080" y="515" text-anchor="middle" class="detail-text">Processes and responds</text>

  <!-- Data stores at bottom -->
  <rect x="30" y="585" width="1340" height="110" rx="10" fill="#fff8e1" stroke="#f57f17" stroke-dasharray="6,3" />
  <text x="700" y="605" text-anchor="middle" font-size="12" font-weight="bold" fill="#f57f17">Persistent Data Stores</text>

  <rect x="60" y="620" width="250" height="55" rx="6" fill="#fff9c4" stroke="#f57f17" />
  <text x="185" y="640" text-anchor="middle" class="step-text" font-weight="bold">PostgreSQL 15</text>
  <text x="185" y="656" text-anchor="middle" class="detail-text">temporal_db | temporal_visibility_db</text>
  <text x="185" y="669" text-anchor="middle" class="detail-text">litellm_db | agent_registry_db</text>

  <rect x="360" y="620" width="250" height="55" rx="6" fill="#fff9c4" stroke="#f57f17" />
  <text x="485" y="640" text-anchor="middle" class="step-text" font-weight="bold">MongoDB 6</text>
  <text x="485" y="656" text-anchor="middle" class="detail-text">agent_configs | conversations</text>
  <text x="485" y="669" text-anchor="middle" class="detail-text">workflow_states | tool_definitions</text>

  <rect x="660" y="620" width="250" height="55" rx="6" fill="#fff9c4" stroke="#f57f17" />
  <text x="785" y="640" text-anchor="middle" class="step-text" font-weight="bold">Redis 7</text>
  <text x="785" y="656" text-anchor="middle" class="detail-text">LLM response cache</text>
  <text x="785" y="669" text-anchor="middle" class="detail-text">Semantic similarity cache</text>

  <rect x="960" y="620" width="250" height="55" rx="6" fill="#fff9c4" stroke="#f57f17" />
  <text x="1085" y="640" text-anchor="middle" class="step-text" font-weight="bold">Ollama Model Store</text>
  <text x="1085" y="656" text-anchor="middle" class="detail-text">100Gi PVC</text>
  <text x="1085" y="669" text-anchor="middle" class="detail-text">llama3 | llama3-chat | codellama</text>
</svg>
