<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #1f2937; }
      .label { font-size: 14px; font-weight: 700; fill: #1f2937; }
      .small { font-size: 12px; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569" />
    </marker>
  </defs>

  <text x="700" y="40" text-anchor="middle" class="title">OpenShift on AWS (ROSA) Architecture</text>

  <rect x="40" y="80" width="960" height="600" rx="16" fill="#fff7ed" stroke="#ea580c" stroke-width="2" stroke-dasharray="8 4" />
  <text x="70" y="110" class="label">AWS Account</text>

  <rect x="80" y="150" width="620" height="430" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="110" y="180" class="label">ROSA VPC</text>

  <rect x="120" y="220" width="240" height="120" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="2" />
  <text x="240" y="255" text-anchor="middle" class="label">Public subnets</text>
  <text x="240" y="280" text-anchor="middle" class="small">NAT gateways</text>
  <text x="240" y="300" text-anchor="middle" class="small">Internet-facing ALBs</text>

  <rect x="410" y="220" width="250" height="120" rx="12" fill="#faf5ff" stroke="#9333ea" stroke-width="2" />
  <text x="535" y="255" text-anchor="middle" class="label">Private subnets</text>
  <text x="535" y="280" text-anchor="middle" class="small">ROSA worker nodes</text>
  <text x="535" y="300" text-anchor="middle" class="small">Cluster services</text>

  <rect x="160" y="390" width="470" height="140" rx="12" fill="#fefce8" stroke="#d97706" stroke-width="2" />
  <text x="395" y="425" text-anchor="middle" class="label">Required AWS endpoints</text>
  <text x="395" y="450" text-anchor="middle" class="small">STS, EC2, ELB, ECR API / DKR, Logs, Monitoring</text>
  <text x="395" y="472" text-anchor="middle" class="small">Route53, ServiceQuotas, Tagging, and S3 gateway</text>

  <rect x="760" y="170" width="220" height="120" rx="12" fill="#fdf2f8" stroke="#db2777" stroke-width="2" />
  <text x="870" y="205" text-anchor="middle" class="label">Red Hat managed</text>
  <text x="870" y="230" text-anchor="middle" class="small">ROSA service / OCM</text>
  <text x="870" y="252" text-anchor="middle" class="small">Managed control plane</text>

  <rect x="1080" y="160" width="260" height="120" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="2" />
  <text x="1210" y="195" text-anchor="middle" class="label">Runner host / pipeline</text>
  <text x="1210" y="220" text-anchor="middle" class="small">terraform + rosa + aws + oc + helm</text>

  <rect x="1080" y="350" width="260" height="110" rx="12" fill="#ecfeff" stroke="#0284c7" stroke-width="2" />
  <text x="1210" y="385" text-anchor="middle" class="label">AWS load balancer controller</text>
  <text x="1210" y="410" text-anchor="middle" class="small">ALB-backed application ingress</text>

  <rect x="1080" y="520" width="260" height="90" rx="12" fill="#f7fee7" stroke="#65a30d" stroke-width="2" />
  <text x="1210" y="555" text-anchor="middle" class="label">Route 53</text>
  <text x="1210" y="580" text-anchor="middle" class="small">Optional API and *.apps aliases</text>

  <line x1="660" y1="280" x2="760" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="660" y1="450" x2="760" y2="260" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="1080" y1="220" x2="980" y2="220" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="1210" y1="280" x2="1210" y2="350" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="1210" y1="460" x2="1210" y2="520" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
</svg>