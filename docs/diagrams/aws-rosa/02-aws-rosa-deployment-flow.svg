<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #1f2937; }
      .step { font-size: 14px; font-weight: 700; fill: #1f2937; }
      .small { font-size: 12px; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569" />
    </marker>
  </defs>
  <text x="700" y="40" text-anchor="middle" class="title">AWS ROSA Deployment Flow</text>

  <rect x="90" y="110" width="280" height="90" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="230" y="145" text-anchor="middle" class="step">1. Create VPC foundation</text>
  <text x="230" y="170" text-anchor="middle" class="small">Subnets, NAT, route tables, SGs</text>

  <rect x="430" y="110" width="280" height="90" rx="12" fill="#fefce8" stroke="#d97706" stroke-width="2" />
  <text x="570" y="145" text-anchor="middle" class="step">2. Create VPC endpoints</text>
  <text x="570" y="170" text-anchor="middle" class="small">Private AWS service access</text>

  <rect x="770" y="110" width="280" height="90" rx="12" fill="#faf5ff" stroke="#9333ea" stroke-width="2" />
  <text x="910" y="145" text-anchor="middle" class="step">3. Render ROSA scripts</text>
  <text x="910" y="170" text-anchor="middle" class="small">Preflight, create, delete, Route53</text>

  <rect x="260" y="290" width="320" height="90" rx="12" fill="#fdf2f8" stroke="#db2777" stroke-width="2" />
  <text x="420" y="325" text-anchor="middle" class="step">4. Create ROSA cluster</text>
  <text x="420" y="350" text-anchor="middle" class="small">STS auto mode via rosa CLI</text>

  <rect x="650" y="290" width="320" height="90" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text x="810" y="325" text-anchor="middle" class="step">5. Render ALB assets</text>
  <text x="810" y="350" text-anchor="middle" class="small">IAM policy, install script, sample ingress</text>

  <rect x="260" y="470" width="320" height="90" rx="12" fill="#ecfeff" stroke="#0284c7" stroke-width="2" />
  <text x="420" y="505" text-anchor="middle" class="step">6. Install ALB controller</text>
  <text x="420" y="530" text-anchor="middle" class="small">oc + helm after cluster readiness</text>

  <rect x="650" y="470" width="360" height="90" rx="12" fill="#f7fee7" stroke="#65a30d" stroke-width="2" />
  <text x="830" y="505" text-anchor="middle" class="step">7. Publish routes and aliases</text>
  <text x="830" y="530" text-anchor="middle" class="small">ALB ingress and optional Route 53 records</text>

  <line x1="370" y1="155" x2="430" y2="155" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="710" y1="155" x2="770" y2="155" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="910" y1="200" x2="500" y2="290" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="810" y1="200" x2="810" y2="290" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="580" y1="335" x2="650" y2="335" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="810" y1="380" x2="540" y2="470" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="580" y1="515" x2="650" y2="515" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" />
</svg>