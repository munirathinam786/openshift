<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444" />
    </marker>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#333}.box{rx:12;ry:12;stroke-width:2}.label{font:700 18px Arial,sans-serif;fill:#222}.small{font:14px Arial,sans-serif;fill:#333}.arrow{stroke:#444;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="600" y="34" text-anchor="middle" class="title">IBM Z Terraform Module Relationships</text>

  <rect x="455" y="60" width="290" height="78" class="box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="600" y="95" text-anchor="middle" class="label">Root module</text>
  <text x="600" y="120" text-anchor="middle" class="small">ibm-z/main.tf</text>

  <rect x="70" y="220" width="220" height="78" class="box" fill="#ECEFF1" stroke="#455A64"/>
  <text x="180" y="255" text-anchor="middle" class="label">install-config</text>
  <text x="180" y="278" text-anchor="middle" class="small">Render install-config.yaml</text>

  <rect x="330" y="220" width="220" height="78" class="box" fill="#ECEFF1" stroke="#455A64"/>
  <text x="440" y="255" text-anchor="middle" class="label">agent-config</text>
  <text x="440" y="278" text-anchor="middle" class="small">Render agent-config.yaml</text>

  <rect x="590" y="220" width="220" height="78" class="box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="700" y="255" text-anchor="middle" class="label">zvm-guests</text>
  <text x="700" y="278" text-anchor="middle" class="small">CSV + wrapper script</text>

  <rect x="850" y="220" width="250" height="78" class="box" fill="#FCE4EC" stroke="#C62828"/>
  <text x="975" y="255" text-anchor="middle" class="label">cluster-install</text>
  <text x="975" y="278" text-anchor="middle" class="small">Copy assets + run installer</text>

  <rect x="300" y="385" width="260" height="72" class="box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="430" y="417" text-anchor="middle" class="label">Generated assets</text>
  <text x="430" y="440" text-anchor="middle" class="small">ibm-z/generated/&lt;cluster&gt;</text>

  <rect x="650" y="385" width="250" height="72" class="box" fill="#FFF8E1" stroke="#F57F17"/>
  <text x="775" y="417" text-anchor="middle" class="label">Bastion host</text>
  <text x="775" y="440" text-anchor="middle" class="small">openshift-install execution</text>

  <path d="M540 138 L220 220" class="arrow"/>
  <path d="M580 138 L450 220" class="arrow"/>
  <path d="M620 138 L700 220" class="arrow"/>
  <path d="M670 138 L970 220" class="arrow"/>
  <path d="M180 298 L380 385" class="arrow"/>
  <path d="M440 298 L450 385" class="arrow"/>
  <path d="M700 298 L500 385" class="arrow"/>
  <path d="M975 298 L775 385" class="arrow"/>
</svg>
