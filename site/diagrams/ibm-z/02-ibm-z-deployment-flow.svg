<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="260" viewBox="0 0 1700 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444" />
    </marker>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#333}.subtitle{font:italic 15px Arial,sans-serif;fill:#666}
      .step{rx:12;ry:12;stroke-width:2}.text{font:700 16px Arial,sans-serif;fill:#222}.arrow{stroke:#444;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="850" y="34" text-anchor="middle" class="title">IBM Z Deployment Flow</text>
  <text x="850" y="58" text-anchor="middle" class="subtitle">Terraform orchestration to bastion-led install</text>

  <rect x="20" y="110" width="190" height="60" class="step" fill="#FFF3E0" stroke="#EF6C00"/><text x="115" y="146" text-anchor="middle" class="text">1. install-config.yaml</text>
  <rect x="250" y="110" width="190" height="60" class="step" fill="#FFF3E0" stroke="#EF6C00"/><text x="345" y="146" text-anchor="middle" class="text">2. agent-config.yaml</text>
  <rect x="480" y="110" width="230" height="60" class="step" fill="#E3F2FD" stroke="#1565C0"/><text x="595" y="146" text-anchor="middle" class="text">3. Optional z/VM guests</text>
  <rect x="750" y="110" width="190" height="60" class="step" fill="#ECEFF1" stroke="#455A64"/><text x="845" y="146" text-anchor="middle" class="text">4. Copy to bastion</text>
  <rect x="980" y="110" width="230" height="60" class="step" fill="#FCE4EC" stroke="#C62828"/><text x="1095" y="146" text-anchor="middle" class="text">5. Create agent image</text>
  <rect x="1250" y="110" width="210" height="60" class="step" fill="#FBE9E7" stroke="#BF360C"/><text x="1355" y="146" text-anchor="middle" class="text">6. Boot IBM Z nodes</text>
  <rect x="1500" y="110" width="180" height="60" class="step" fill="#E8F5E9" stroke="#2E7D32"/><text x="1590" y="146" text-anchor="middle" class="text">7. Wait for install</text>

  <path d="M210 140 H250" class="arrow"/>
  <path d="M440 140 H480" class="arrow"/>
  <path d="M710 140 H750" class="arrow"/>
  <path d="M940 140 H980" class="arrow"/>
  <path d="M1210 140 H1250" class="arrow"/>
  <path d="M1460 140 H1500" class="arrow"/>
</svg>
