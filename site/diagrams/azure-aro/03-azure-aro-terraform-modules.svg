<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="800" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Azure ARO Terraform Modules</text>

  <rect x="500" y="90" width="300" height="80" rx="14" fill="#D1C4E9" stroke="#5E35B1" stroke-width="3"/>
  <text x="650" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700">Root module</text>
  <text x="650" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">azure-aro/main.tf</text>

  <rect x="100" y="260" width="250" height="90" rx="14" fill="#E3F2FD" stroke="#1565C0" stroke-width="3"/>
  <text x="225" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">networking</text>
  <text x="225" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">resource group, VNet, subnets</text>

  <rect x="390" y="260" width="250" height="90" rx="14" fill="#FCE4EC" stroke="#C2185B" stroke-width="3"/>
  <text x="515" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">identity</text>
  <text x="515" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">Entra app, SP, and RBAC</text>

  <rect x="680" y="260" width="250" height="90" rx="14" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3"/>
  <text x="805" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">cluster</text>
  <text x="805" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">azurerm_redhat_openshift_cluster</text>

  <rect x="970" y="260" width="250" height="90" rx="14" fill="#E1F5FE" stroke="#0277BD" stroke-width="3"/>
  <text x="1095" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">cluster-assets</text>
  <text x="1095" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">preflight, kubeconfig, DNS, delete</text>

  <rect x="470" y="440" width="360" height="90" rx="14" fill="#ECEFF1" stroke="#455A64" stroke-width="3"/>
  <text x="650" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Outputs</text>
  <text x="650" y="504" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">cluster IDs, console URL, IPs, helper scripts</text>

  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5E35B1"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455A64"/>
    </marker>
  </defs>

  <g stroke="#5E35B1" stroke-width="4" fill="none" marker-end="url(#arrowPurple)">
    <line x1="600" y1="170" x2="260" y2="260"/>
    <line x1="640" y1="170" x2="515" y2="260"/>
    <line x1="700" y1="170" x2="805" y2="260"/>
    <line x1="745" y1="170" x2="1095" y2="260"/>
  </g>

  <g stroke="#455A64" stroke-width="4" fill="none" marker-end="url(#arrowGray)">
    <line x1="225" y1="350" x2="520" y2="440"/>
    <line x1="515" y1="350" x2="600" y2="440"/>
    <line x1="805" y1="350" x2="700" y2="440"/>
    <line x1="1095" y1="350" x2="780" y2="440"/>
  </g>
</svg>
