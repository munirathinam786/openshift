<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 750" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: bold; fill: #1a1a2e; }
      .box-title { font-size: 12px; font-weight: bold; }
      .box-detail { font-size: 10px; fill: #555; }
      .config-text { font-size: 9px; font-family: monospace; fill: #333; }
      .label { font-size: 10px; fill: #666; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555" />
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828" />
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32" />
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7b1fa2" />
    </marker>
  </defs>

  <text x="700" y="30" text-anchor="middle" class="title">LLM Connectivity Architecture — Agent Builder on OpenShift Baremetal</text>

  <!-- OpenShift Cluster Boundary -->
  <rect x="30" y="50" width="900" height="660" rx="12" fill="#f5f5f5" stroke="#424242" stroke-width="2" stroke-dasharray="8,4" />
  <text x="50" y="75" font-size="14" font-weight="bold" fill="#424242">OpenShift Baremetal Cluster (Namespace: agent-builder)</text>

  <!-- Agent Builder API -->
  <rect x="60" y="100" width="250" height="100" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="185" y="120" text-anchor="middle" class="box-title" fill="#1565c0">Agent Builder API</text>
  <text x="185" y="138" text-anchor="middle" class="box-detail">FastAPI | Port: 8000</text>
  <text x="185" y="155" text-anchor="middle" class="box-detail">Sends LLM requests to LiteLLM</text>
  <text x="185" y="172" text-anchor="middle" class="box-detail">Model selection per-agent configurable</text>

  <!-- Temporal Workers -->
  <rect x="60" y="220" width="250" height="90" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="185" y="240" text-anchor="middle" class="box-title" fill="#1565c0">Temporal Workers</text>
  <text x="185" y="258" text-anchor="middle" class="box-detail">Python Workers | Port: 8000</text>
  <text x="185" y="275" text-anchor="middle" class="box-detail">Execute LLM calls during workflows</text>
  <text x="185" y="292" text-anchor="middle" class="box-detail">LITELLM_URL=http://litellm:4000</text>

  <!-- LiteLLM Proxy - Central Hub -->
  <rect x="380" y="130" width="280" height="220" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="3" />
  <text x="520" y="152" text-anchor="middle" class="box-title" fill="#7b1fa2">LiteLLM Proxy (Central Gateway)</text>
  <text x="520" y="170" text-anchor="middle" class="box-detail">ghcr.io/berriai/litellm:v1.75.5-stable</text>
  <text x="520" y="185" text-anchor="middle" class="box-detail">Port: 4000 | Route: litellm.agent-builder.*</text>
  <line x1="390" y1="195" x2="650" y2="195" stroke="#7b1fa2" stroke-width="0.5" />

  <!-- Model List in LiteLLM -->
  <text x="395" y="212" class="config-text">Registered Models:</text>
  <text x="400" y="226" class="config-text" fill="#c62828">• claude-3-haiku (Anthropic)</text>
  <text x="400" y="240" class="config-text" fill="#c62828">• gpt-4o (Azure OpenAI)</text>
  <text x="400" y="254" class="config-text" fill="#c62828">• openai-gpt-4o (OpenAI Direct)</text>
  <text x="400" y="268" class="config-text" fill="#2e7d32">• ollama/llama3 (In-Cluster)</text>
  <text x="400" y="282" class="config-text" fill="#2e7d32">• ollama/llama3-chat (In-Cluster)</text>
  <text x="400" y="296" class="config-text" fill="#0d47a1">• laptop-llama3 (Laptop Ollama)</text>
  <text x="400" y="310" class="config-text" fill="#0d47a1">• laptop-codellama (Laptop Ollama)</text>
  <text x="400" y="324" class="config-text" fill="#0d47a1">• laptop-mistral (Laptop Ollama)</text>

  <!-- Redis Cache -->
  <rect x="380" y="380" width="280" height="80" rx="8" fill="#fff8e1" stroke="#f57f17" stroke-width="2" />
  <text x="520" y="400" text-anchor="middle" class="box-title" fill="#f57f17">Redis 7 — LLM Cache</text>
  <text x="520" y="418" text-anchor="middle" class="box-detail">Port: 6379 | 2Gi Memory</text>
  <text x="520" y="434" text-anchor="middle" class="box-detail">Response caching + Semantic caching</text>
  <text x="520" y="448" text-anchor="middle" class="box-detail">allkeys-lru eviction policy</text>

  <!-- Ollama In-Cluster -->
  <rect x="60" y="380" width="280" height="150" rx="8" fill="#fce4ec" stroke="#c2185b" stroke-width="2" />
  <text x="200" y="400" text-anchor="middle" class="box-title" fill="#c2185b">Ollama — In-Cluster LLM</text>
  <text x="200" y="418" text-anchor="middle" class="box-detail">ollama/ollama:latest | Port: 11434</text>
  <text x="200" y="433" text-anchor="middle" class="box-detail">PVC: 100Gi (Model Storage)</text>
  <line x1="70" y1="442" x2="330" y2="442" stroke="#c2185b" stroke-width="0.5" />
  <text x="80" y="458" class="config-text">Configuration:</text>
  <text x="85" y="472" class="config-text">OLLAMA_KEEP_ALIVE=24h</text>
  <text x="85" y="486" class="config-text">OLLAMA_MAX_LOADED_MODELS=3</text>
  <text x="85" y="500" class="config-text">Models: llama3, llama3-chat</text>
  <text x="85" y="514" class="config-text">GPU: Optional (nvidia.com/gpu: 1)</text>

  <!-- PostgreSQL for LiteLLM -->
  <rect x="380" y="490" width="280" height="70" rx="8" fill="#fff8e1" stroke="#f57f17" stroke-width="2" />
  <text x="520" y="510" text-anchor="middle" class="box-title" fill="#f57f17">PostgreSQL 15 — LiteLLM DB</text>
  <text x="520" y="528" text-anchor="middle" class="box-detail">Database: litellm_db</text>
  <text x="520" y="544" text-anchor="middle" class="box-detail">Token usage tracking + model configs</text>

  <!-- Network Policy note -->
  <rect x="60" y="565" width="600" height="60" rx="8" fill="#e8eaf6" stroke="#283593" stroke-dasharray="4,2" />
  <text x="360" y="585" text-anchor="middle" class="box-title" fill="#283593">Cluster Network (ClusterIP Services)</text>
  <text x="360" y="602" text-anchor="middle" class="box-detail">litellm:4000 ← agent-builder-api, temporal-workers, agent-deployment-service</text>
  <text x="360" y="617" text-anchor="middle" class="box-detail">ollama:11434 ← litellm (internal cluster traffic only)</text>

  <!-- External Zone -->
  <rect x="960" y="50" width="420" height="660" rx="12" fill="#fff3e0" stroke="#ef6c00" stroke-width="2" stroke-dasharray="8,4" />
  <text x="1170" y="75" font-size="14" font-weight="bold" fill="#ef6c00">External / Internet</text>

  <!-- Anthropic -->
  <rect x="990" y="100" width="180" height="70" rx="8" fill="#ffcdd2" stroke="#c62828" stroke-width="2" />
  <text x="1080" y="122" text-anchor="middle" class="box-title" fill="#c62828">Anthropic API</text>
  <text x="1080" y="140" text-anchor="middle" class="box-detail">api.anthropic.com</text>
  <text x="1080" y="155" text-anchor="middle" class="box-detail">Claude 3 Haiku / Sonnet / Opus</text>

  <!-- Azure OpenAI -->
  <rect x="990" y="190" width="180" height="70" rx="8" fill="#ffcdd2" stroke="#c62828" stroke-width="2" />
  <text x="1080" y="212" text-anchor="middle" class="box-title" fill="#c62828">Azure OpenAI</text>
  <text x="1080" y="230" text-anchor="middle" class="box-detail">*.openai.azure.com</text>
  <text x="1080" y="245" text-anchor="middle" class="box-detail">GPT-4o Deployment</text>

  <!-- OpenAI Direct -->
  <rect x="990" y="280" width="180" height="70" rx="8" fill="#ffcdd2" stroke="#c62828" stroke-width="2" />
  <text x="1080" y="302" text-anchor="middle" class="box-title" fill="#c62828">OpenAI API</text>
  <text x="1080" y="320" text-anchor="middle" class="box-detail">api.openai.com</text>
  <text x="1080" y="335" text-anchor="middle" class="box-detail">GPT-4o Direct Access</text>

  <!-- Laptop Ollama (big emphasis) -->
  <rect x="970" y="390" width="400" height="220" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3" />
  <text x="1170" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Developer Laptop — Ollama</text>
  <text x="1170" y="435" text-anchor="middle" class="box-detail">IP: 192.168.x.x:11434 (configurable)</text>
  <line x1="985" y1="445" x2="1355" y2="445" stroke="#2e7d32" stroke-width="0.5" />

  <text x="990" y="465" class="config-text" fill="#2e7d32">Connectivity Method:</text>
  <text x="995" y="480" class="config-text">1. Laptop runs: ollama serve (binds 0.0.0.0:11434)</text>
  <text x="995" y="495" class="config-text">2. Connected to same network as bastion</text>
  <text x="995" y="510" class="config-text">3. LiteLLM config: api_base=http://&lt;laptop-ip&gt;:11434</text>
  <text x="995" y="525" class="config-text">4. K8s ExternalName Service routes traffic out</text>

  <text x="990" y="548" class="config-text" fill="#2e7d32">Available Models:</text>
  <text x="995" y="563" class="config-text">• llama3 (8B) — General purpose</text>
  <text x="995" y="578" class="config-text">• codellama (34B) — Code generation</text>
  <text x="995" y="593" class="config-text">• mistral (7B) — Lightweight alternative</text>

  <!-- Connection Arrows -->
  <!-- API → LiteLLM -->
  <line x1="310" y1="150" x2="380" y2="200" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arr-purple)" />
  <text x="330" y="170" class="label" fill="#7b1fa2">LLM API calls</text>

  <!-- Workers → LiteLLM -->
  <line x1="310" y1="265" x2="380" y2="240" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arr-purple)" />
  <text x="330" y="258" class="label" fill="#7b1fa2">Workflow LLM</text>

  <!-- LiteLLM → Redis -->
  <line x1="520" y1="350" x2="520" y2="380" stroke="#f57f17" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="530" y="368" class="label">cache</text>

  <!-- LiteLLM → PostgreSQL -->
  <line x1="520" y1="350" x2="520" y2="490" stroke="#f57f17" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)" />

  <!-- LiteLLM → Ollama (in-cluster) -->
  <line x1="380" y1="310" x2="340" y2="430" stroke="#c2185b" stroke-width="2" marker-end="url(#arr-red)" />
  <text x="340" y="365" class="label" fill="#c2185b">ollama:11434</text>

  <!-- LiteLLM → Anthropic -->
  <line x1="660" y1="170" x2="990" y2="135" stroke="#c62828" stroke-width="2" marker-end="url(#arr-red)" />
  <text x="800" y="140" class="label" fill="#c62828">HTTPS (API Key)</text>

  <!-- LiteLLM → Azure OpenAI -->
  <line x1="660" y1="210" x2="990" y2="225" stroke="#c62828" stroke-width="2" marker-end="url(#arr-red)" />
  <text x="800" y="215" class="label" fill="#c62828">HTTPS (API Key)</text>

  <!-- LiteLLM → OpenAI -->
  <line x1="660" y1="250" x2="990" y2="305" stroke="#c62828" stroke-width="2" marker-end="url(#arr-red)" />

  <!-- LiteLLM → Laptop Ollama -->
  <line x1="660" y1="300" x2="970" y2="480" stroke="#2e7d32" stroke-width="3" marker-end="url(#arr-green)" />
  <text x="790" y="370" class="label" fill="#2e7d32">HTTP (ExternalName Svc)</text>
  <text x="790" y="383" class="label" fill="#2e7d32">laptop-ip:11434</text>

  <!-- TF Variables Note -->
  <rect x="60" y="652" width="860" height="48" rx="6" fill="#efebe9" stroke="#4e342e" stroke-dasharray="4,2" />
  <text x="490" y="668" text-anchor="middle" font-size="10" font-weight="bold" fill="#4e342e">Terraform Variables for LLM Configuration</text>
  <text x="70" y="688" class="config-text" fill="#4e342e">enable_ollama = true | ollama_model = "llama3" | enable_local_llm_laptop = true | local_llm_laptop_url = "http://192.168.x.x:11434" | litellm_anthropic_api_key | litellm_azure_api_key | litellm_openai_api_key</text>
</svg>
