<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 850" font-family="Roboto, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: bold; fill: #1a1a2e; }
      .stage-label { font-size: 12px; font-weight: bold; fill: white; }
      .step-label { font-size: 10px; fill: #333; }
      .step-detail { font-size: 9px; fill: #666; }
      .param-label { font-size: 9px; fill: #1565c0; }
      .secret-label { font-size: 9px; fill: #c62828; }
      .note-text { font-size: 9px; fill: #555; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555" />
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32" />
    </marker>
  </defs>

  <text x="700" y="30" text-anchor="middle" class="title">Agent Builder Factory — ADO Pipeline (Day 1 Deployment)</text>

  <!-- Parameters Box -->
  <rect x="30" y="50" width="280" height="280" rx="8" fill="#e3f2fd" stroke="#1565c0" />
  <text x="170" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Pipeline Parameters</text>
  <line x1="40" y1="78" x2="300" y2="78" stroke="#1565c0" stroke-width="0.5" />

  <text x="45" y="95" class="param-label">deploymentScope:</text>
  <text x="155" y="95" class="step-detail">full-platform | data-layer-only</text>
  <text x="155" y="106" class="step-detail">app-layer-only | ollama-only | litellm-only</text>

  <text x="45" y="123" class="param-label">terraformAction:</text>
  <text x="155" y="123" class="step-detail">plan | apply | destroy</text>

  <text x="45" y="143" class="param-label">enableOllama:</text>
  <text x="155" y="143" class="step-detail">true (default) | false</text>

  <text x="45" y="163" class="param-label">ollamaModel:</text>
  <text x="155" y="163" class="step-detail">llama3 | llama3:70b | mistral</text>
  <text x="155" y="174" class="step-detail">codellama | llama3:8b</text>

  <text x="45" y="194" class="param-label">enableLocalLLMLaptop:</text>
  <text x="185" y="194" class="step-detail">true | false</text>

  <text x="45" y="214" class="param-label">localLLMLaptopUrl:</text>
  <text x="165" y="214" class="step-detail">http://192.168.x.x:11434</text>

  <text x="45" y="234" class="param-label">ollamaGpuEnabled:</text>
  <text x="165" y="234" class="step-detail">true | false</text>

  <text x="45" y="254" class="param-label">imageTag:</text>
  <text x="155" y="254" class="step-detail">latest (default)</text>

  <text x="45" y="274" class="param-label">targetCluster:</text>
  <text x="155" y="274" class="step-detail">dc-primary | dr-secondary</text>

  <text x="45" y="294" class="param-label">enableOIDC:</text>
  <text x="155" y="294" class="step-detail">true | false</text>

  <!-- Secrets Box -->
  <rect x="30" y="345" width="280" height="170" rx="8" fill="#fce4ec" stroke="#c62828" />
  <text x="170" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">ADO Variable Group: agent-builder-secrets</text>
  <line x1="40" y1="373" x2="300" y2="373" stroke="#c62828" stroke-width="0.5" />

  <text x="45" y="390" class="secret-label">🔒 postgres-password</text>
  <text x="45" y="405" class="secret-label">🔒 mongodb-root-password</text>
  <text x="45" y="420" class="secret-label">🔒 redis-password</text>
  <text x="45" y="435" class="secret-label">🔒 litellm-master-key</text>
  <text x="45" y="450" class="secret-label">🔒 anthropic-api-key</text>
  <text x="45" y="465" class="secret-label">🔒 azure-openai-key</text>
  <text x="45" y="480" class="secret-label">🔒 openai-api-key</text>
  <text x="45" y="495" class="secret-label">🔒 github-token</text>

  <!-- Stage 1: Build Images -->
  <rect x="350" y="50" width="300" height="130" rx="8" fill="#1565c0" stroke="#0d47a1" />
  <text x="500" y="72" text-anchor="middle" class="stage-label">Stage 1: Build &amp; Push Images</text>
  <rect x="360" y="82" width="280" height="88" rx="4" fill="white" opacity="0.9" />
  <text x="370" y="99" class="step-label">1. Checkout source code</text>
  <text x="370" y="114" class="step-label">2. Build container images (podman)</text>
  <text x="380" y="127" class="step-detail">• agent-builder-api, ui, temporal-workers</text>
  <text x="380" y="139" class="step-detail">• tool-catalog, deploy-svc, registry, a2a</text>
  <text x="370" y="154" class="step-label">3. Push to Quay mirror registry</text>

  <!-- Stage 2: Data Layer -->
  <rect x="350" y="200" width="300" height="150" rx="8" fill="#f57f17" stroke="#e65100" />
  <text x="500" y="222" text-anchor="middle" class="stage-label">Stage 2: Deploy Data Layer</text>
  <rect x="360" y="232" width="280" height="108" rx="4" fill="white" opacity="0.9" />
  <text x="370" y="249" class="step-label">1. Install Terraform</text>
  <text x="370" y="264" class="step-label">2. terraform init</text>
  <text x="370" y="279" class="step-label">3. terraform plan/apply:</text>
  <text x="380" y="292" class="step-detail">-target=module.namespace</text>
  <text x="380" y="304" class="step-detail">-target=module.postgresql</text>
  <text x="380" y="316" class="step-detail">-target=module.mongodb</text>
  <text x="380" y="328" class="step-detail">-target=module.redis</text>

  <!-- Stage 3: Infrastructure -->
  <rect x="350" y="370" width="300" height="155" rx="8" fill="#7b1fa2" stroke="#4a148c" />
  <text x="500" y="392" text-anchor="middle" class="stage-label">Stage 3: Temporal + LiteLLM + Ollama</text>
  <rect x="360" y="402" width="280" height="113" rx="4" fill="white" opacity="0.9" />
  <text x="370" y="419" class="step-label">1. terraform init</text>
  <text x="370" y="434" class="step-label">2. terraform plan/apply:</text>
  <text x="380" y="447" class="step-detail">-target=module.temporal</text>
  <text x="380" y="459" class="step-detail">-target=module.ollama (if enabled)</text>
  <text x="380" y="471" class="step-detail">-target=module.litellm</text>
  <text x="370" y="488" class="step-label">3. Configure LLM models:</text>
  <text x="380" y="501" class="step-detail">Ollama in-cluster + Laptop Ollama + Cloud APIs</text>

  <!-- Stage 4: App Layer -->
  <rect x="350" y="545" width="300" height="175" rx="8" fill="#2e7d32" stroke="#1b5e20" />
  <text x="500" y="567" text-anchor="middle" class="stage-label">Stage 4: Deploy Application Services</text>
  <rect x="360" y="577" width="280" height="133" rx="4" fill="white" opacity="0.9" />
  <text x="370" y="594" class="step-label">1. terraform init</text>
  <text x="370" y="609" class="step-label">2. terraform plan/apply:</text>
  <text x="380" y="622" class="step-detail">-target=module.temporal_workers</text>
  <text x="380" y="634" class="step-detail">-target=module.agent_builder_api</text>
  <text x="380" y="646" class="step-detail">-target=module.agent_builder_ui</text>
  <text x="380" y="658" class="step-detail">-target=module.tool_catalog</text>
  <text x="380" y="670" class="step-detail">-target=module.agent_deployment_service</text>
  <text x="380" y="682" class="step-detail">-target=module.agent_registry</text>
  <text x="380" y="694" class="step-detail">-target=module.a2a_gateway</text>

  <!-- Stage 5: Validate -->
  <rect x="700" y="545" width="300" height="130" rx="8" fill="#00695c" stroke="#004d40" />
  <text x="850" y="567" text-anchor="middle" class="stage-label">Stage 5: Validate Platform Health</text>
  <rect x="710" y="577" width="280" height="88" rx="4" fill="white" opacity="0.9" />
  <text x="720" y="594" class="step-label">1. SSH to bastion</text>
  <text x="720" y="609" class="step-label">2. Check pod status (oc get pods)</text>
  <text x="720" y="624" class="step-label">3. Verify routes (oc get routes)</text>
  <text x="720" y="639" class="step-label">4. Verify PVCs (oc get pvc)</text>
  <text x="720" y="654" class="step-label">5. All-pods-running check</text>

  <!-- Stage 6: Summary -->
  <rect x="700" y="695" width="300" height="60" rx="8" fill="#424242" stroke="#212121" />
  <text x="850" y="717" text-anchor="middle" class="stage-label">Stage 6: Pipeline Summary</text>
  <text x="850" y="740" text-anchor="middle" font-size="9" fill="#bbb">Action | Scope | Cluster | Image Tag | LLM Config</text>

  <!-- Arrows between stages -->
  <line x1="500" y1="180" x2="500" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arr)" />
  <line x1="500" y1="350" x2="500" y2="370" stroke="#555" stroke-width="2" marker-end="url(#arr)" />
  <line x1="500" y1="525" x2="500" y2="545" stroke="#555" stroke-width="2" marker-end="url(#arr)" />
  <line x1="650" y1="630" x2="700" y2="630" stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-green)" />
  <line x1="850" y1="675" x2="850" y2="695" stroke="#555" stroke-width="2" marker-end="url(#arr)" />

  <!-- Execution Environment -->
  <rect x="700" y="50" width="300" height="130" rx="8" fill="#efebe9" stroke="#4e342e" stroke-dasharray="4,2" />
  <text x="850" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#4e342e">Execution Environment</text>
  <line x1="710" y1="80" x2="990" y2="80" stroke="#4e342e" stroke-width="0.5" />
  <text x="720" y="98" class="note-text">Pool: self-hosted-linux</text>
  <text x="720" y="113" class="note-text">Agent: bastion node with SSH access</text>
  <text x="720" y="128" class="note-text">Tools: Terraform, oc CLI, podman</text>
  <text x="720" y="143" class="note-text">Terraform Dir: ipi-method/agent-builder/</text>
  <text x="720" y="158" class="note-text">Pattern: null_resource + SSH remote-exec</text>

  <!-- Terraform Module Structure -->
  <rect x="700" y="200" width="300" height="320" rx="8" fill="#f5f5f5" stroke="#757575" stroke-dasharray="4,2" />
  <text x="850" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#424242">Terraform Module Structure</text>
  <line x1="710" y1="230" x2="990" y2="230" stroke="#757575" stroke-width="0.5" />

  <text x="720" y="248" font-size="10" font-family="monospace" fill="#333">agent-builder/</text>
  <text x="720" y="263" font-size="10" font-family="monospace" fill="#555">├── main.tf</text>
  <text x="720" y="278" font-size="10" font-family="monospace" fill="#555">├── variables.tf</text>
  <text x="720" y="293" font-size="10" font-family="monospace" fill="#555">├── terraform.tfvars</text>
  <text x="720" y="308" font-size="10" font-family="monospace" fill="#555">├── outputs.tf</text>
  <text x="720" y="323" font-size="10" font-family="monospace" fill="#555">├── versions.tf</text>
  <text x="720" y="338" font-size="10" font-family="monospace" fill="#555">└── modules/</text>
  <text x="740" y="353" font-size="10" font-family="monospace" fill="#f57f17">├── namespace/</text>
  <text x="740" y="368" font-size="10" font-family="monospace" fill="#f57f17">├── postgresql/</text>
  <text x="740" y="383" font-size="10" font-family="monospace" fill="#f57f17">├── mongodb/</text>
  <text x="740" y="398" font-size="10" font-family="monospace" fill="#f57f17">├── redis/</text>
  <text x="740" y="413" font-size="10" font-family="monospace" fill="#7b1fa2">├── temporal/</text>
  <text x="740" y="428" font-size="10" font-family="monospace" fill="#c2185b">├── ollama/</text>
  <text x="740" y="443" font-size="10" font-family="monospace" fill="#7b1fa2">├── litellm/</text>
  <text x="740" y="458" font-size="10" font-family="monospace" fill="#2e7d32">├── agent-builder-api/</text>
  <text x="740" y="473" font-size="10" font-family="monospace" fill="#2e7d32">├── agent-builder-ui/</text>
  <text x="740" y="488" font-size="10" font-family="monospace" fill="#2e7d32">├── tool-catalog/</text>
  <text x="740" y="503" font-size="10" font-family="monospace" fill="#2e7d32">├── agent-deployment-service/</text>
  <text x="740" y="518" font-size="10" font-family="monospace" fill="#2e7d32">├── agent-registry/</text>
  <text x="740" y="533" font-size="10" font-family="monospace" fill="#2e7d32">└── a2a-gateway/</text>

  <!-- Condition annotations -->
  <text x="530" y="195" font-size="8" fill="#555">depends: none</text>
  <text x="435" y="365" font-size="8" fill="#555">depends: Data Layer</text>
  <text x="400" y="540" font-size="8" fill="#555">depends: Infrastructure</text>
  <text x="655" y="618" font-size="8" fill="#555">condition: apply</text>
</svg>
