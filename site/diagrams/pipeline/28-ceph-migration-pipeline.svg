<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1000" height="680" viewBox="-0.5 -0.5 1000 680">
  <defs/>
  <g>
    <!-- Title -->
    <text x="500" y="35" fill="#333" font-family="Helvetica" font-size="18" font-weight="bold" text-anchor="middle">Ceph Migration Pipeline — Azure DevOps</text>

    <!-- Trigger -->
    <polygon points="530,80 470,80 440,110 470,140 530,140 560,110" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="2"/>
    <text x="500" y="105" fill="#333" font-family="Helvetica" font-size="11" text-anchor="middle">Manual Trigger</text>
    <text x="500" y="120" fill="#666" font-family="Helvetica" font-size="9" text-anchor="middle">azure-pipelines-ceph-migration.yml</text>

    <!-- Arrow -->
    <line x1="500" y1="140" x2="500" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Parameters Box -->
    <rect x="340" y="170" rx="5" ry="5" width="320" height="80" fill="#FFF2CC" stroke="#D6B656" stroke-width="2"/>
    <text x="500" y="190" fill="#333" font-family="Helvetica" font-size="12" font-weight="bold" text-anchor="middle">Parameters</text>
    <text x="500" y="205" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">deploymentScope | migrationAction</text>
    <text x="500" y="220" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">migrationMode | replicationSchedule</text>
    <text x="500" y="235" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">poolName | verifyDataIntegrity | terraformAction</text>

    <!-- Arrow -->
    <line x1="500" y1="250" x2="500" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Decision Diamond -->
    <polygon points="500,280 590,320 500,360 410,320" fill="#F8CECC" stroke="#B85450" stroke-width="2"/>
    <text x="500" y="323" fill="#333" font-family="Helvetica" font-size="11" text-anchor="middle">deploymentScope?</text>

    <!-- DC Branch -->
    <line x1="410" y1="320" x2="290" y2="320" stroke="#333" stroke-width="2"/>
    <line x1="290" y1="320" x2="290" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="340" y="312" fill="#B85450" font-family="Helvetica" font-size="10">dc-only</text>

    <!-- DC Stage -->
    <rect x="140" y="390" rx="10" ry="10" width="300" height="110" fill="#D5E8D4" stroke="#82B366" stroke-width="2"/>
    <text x="290" y="415" fill="#333" font-family="Helvetica" font-size="12" font-weight="bold" text-anchor="middle">Stage 1a: Ceph Migration — DC Primary</text>
    <text x="290" y="435" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">cd openshiftbaremetal</text>
    <text x="290" y="450" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">terraform init → terraform $action</text>
    <text x="290" y="465" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">-var-file=ceph-migration.tfvars</text>
    <text x="290" y="480" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">-var ceph_migration_action=$migrationAction</text>

    <!-- DR Branch -->
    <line x1="590" y1="320" x2="710" y2="320" stroke="#333" stroke-width="2"/>
    <line x1="710" y1="320" x2="710" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="640" y="312" fill="#B85450" font-family="Helvetica" font-size="10">dr-only</text>

    <!-- DR Stage -->
    <rect x="560" y="390" rx="10" ry="10" width="300" height="110" fill="#D5E8D4" stroke="#82B366" stroke-width="2"/>
    <text x="710" y="415" fill="#333" font-family="Helvetica" font-size="12" font-weight="bold" text-anchor="middle">Stage 1b: Ceph Migration — DR Secondary</text>
    <text x="710" y="435" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">cd openshiftbaremetal-dr</text>
    <text x="710" y="450" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">terraform init → terraform $action</text>
    <text x="710" y="465" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">-var-file=ceph-migration.tfvars</text>
    <text x="710" y="480" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">-var ceph_migration_action=$migrationAction</text>

    <!-- Converge arrows to Summary -->
    <line x1="290" y1="500" x2="290" y2="550" stroke="#333" stroke-width="2"/>
    <line x1="290" y1="550" x2="500" y2="550" stroke="#333" stroke-width="2"/>
    <line x1="710" y1="500" x2="710" y2="550" stroke="#333" stroke-width="2"/>
    <line x1="710" y1="550" x2="500" y2="550" stroke="#333" stroke-width="2"/>
    <line x1="500" y1="550" x2="500" y2="580" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Summary Stage -->
    <rect x="370" y="580" rx="10" ry="10" width="260" height="60" fill="#E1D5E7" stroke="#9673A6" stroke-width="2"/>
    <text x="500" y="605" fill="#333" font-family="Helvetica" font-size="12" font-weight="bold" text-anchor="middle">Stage 2: Summary</text>
    <text x="500" y="625" fill="#666" font-family="Helvetica" font-size="10" text-anchor="middle">Print migration parameters</text>

    <!-- Arrowhead marker -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
      </marker>
    </defs>
  </g>
</svg>
