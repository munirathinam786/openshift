# Author: Sathishkumar Munirathinam

# =============================================================================
# Azure DevOps Pipeline — VM Migration (MTV — Migration Toolkit for Virtualization)
# Migrates VMs from VMware/RHV/OpenStack to OpenShift Virtualization
# =============================================================================

trigger: none   # Always manual — never auto-triggered

parameters:
  # ---- Deployment Scope ----
  - name: deploymentScope
    displayName: "Target Cluster"
    type: string
    default: "dc-only"
    values:
      - dc-only
      - dr-only

  # ---- Source Provider ----
  - name: sourceProviderType
    displayName: "Source Virtualization Platform"
    type: string
    default: "vsphere"
    values:
      - vsphere
      - ovirt
      - openstack

  - name: sourceProviderName
    displayName: "Source Provider Name"
    type: string
    default: "vmware-datacenter"

  - name: sourceProviderUrl
    displayName: "Source Provider URL (e.g. https://vcenter.example.com/sdk)"
    type: string
    default: ""

  # ---- Migration Type ----
  - name: migrationType
    displayName: "Migration Type"
    type: string
    default: "cold"
    values:
      - cold
      - warm

  - name: migrationStartImmediately
    displayName: "Start Migration Immediately"
    type: boolean
    default: false

  - name: migrationCutoverDatetime
    displayName: "Warm Migration Cutover (ISO 8601, e.g. 2026-04-10T02:00:00Z)"
    type: string
    default: ""

  # ---- Migration Options ----
  - name: preserveStaticIPs
    displayName: "Preserve Source VM Static IPs"
    type: boolean
    default: true

  - name: preserveMACAddresses
    displayName: "Preserve Source VM MAC Addresses"
    type: boolean
    default: false

  - name: maxConcurrentVMs
    displayName: "Max Concurrent VM Migrations"
    type: number
    default: 10

  - name: maxConcurrentDisksPerVM
    displayName: "Max Concurrent Disk Transfers per VM"
    type: number
    default: 2

  # ---- Terraform Action ----
  - name: terraformAction
    displayName: "Terraform Action"
    type: string
    default: "plan"
    values:
      - plan
      - apply
      - destroy

  # ---- Variable Group ----
  - name: variableGroup
    displayName: "ADO Variable Group (for secrets)"
    type: string
    default: "ocp-vm-migration-secrets"

variables:
  - group: ${{ parameters.variableGroup }}
  - name: TF_IN_AUTOMATION
    value: "true"
  - name: TF_INPUT
    value: "false"

stages:
  # =====================================================================
  # Stage 1: DC Primary — VM Migration
  # =====================================================================
  - stage: Migration_DC_Primary
    displayName: "VM Migration — DC Primary"
    condition: |
      and(
        succeeded(),
        eq('${{ parameters.deploymentScope }}', 'dc-only')
      )
    jobs:
      - job: MigrationDCPrimary
        displayName: "Terraform VM Migration — DC Primary"
        pool:
          name: "self-hosted-linux"
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: "latest"

          - script: |
              cd openshiftbaremetal
              terraform init -input=false
            displayName: "Terraform Init — DC Primary"

          - script: |
              cd openshiftbaremetal
              terraform ${{ parameters.terraformAction }} \
                -var-file=terraform.tfvars \
                -var-file=vm-migration.tfvars \
                -var enable_vm_migration=true \
                -var source_provider_type=${{ parameters.sourceProviderType }} \
                -var source_provider_name=${{ parameters.sourceProviderName }} \
                -var source_provider_url="${{ parameters.sourceProviderUrl }}" \
                -var migration_type=${{ parameters.migrationType }} \
                -var migration_start_immediately=${{ parameters.migrationStartImmediately }} \
                -var migration_cutover_datetime="${{ parameters.migrationCutoverDatetime }}" \
                -var migration_preserve_static_ips=${{ parameters.preserveStaticIPs }} \
                -var migration_preserve_mac_addresses=${{ parameters.preserveMACAddresses }} \
                -var migration_max_concurrent_vms=${{ parameters.maxConcurrentVMs }} \
                -var migration_max_concurrent_disks_per_vm=${{ parameters.maxConcurrentDisksPerVM }} \
                -input=false \
                $(if [ "${{ parameters.terraformAction }}" = "apply" ] || [ "${{ parameters.terraformAction }}" = "destroy" ]; then echo "-auto-approve"; fi)
            displayName: "Terraform ${{ parameters.terraformAction }} — DC Primary Migration"
            env:
              TF_VAR_source_provider_username: $(source-provider-username)
              TF_VAR_source_provider_password: $(source-provider-password)
              TF_VAR_source_provider_thumbprint: $(source-provider-thumbprint)

  # =====================================================================
  # Stage 2: DR Secondary — VM Migration
  # =====================================================================
  - stage: Migration_DR_Secondary
    displayName: "VM Migration — DR Secondary"
    condition: |
      and(
        succeeded(),
        eq('${{ parameters.deploymentScope }}', 'dr-only')
      )
    jobs:
      - job: MigrationDRSecondary
        displayName: "Terraform VM Migration — DR Secondary"
        pool:
          name: "self-hosted-linux"
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: "latest"

          - script: |
              cd openshiftbaremetal-dr
              terraform init -input=false
            displayName: "Terraform Init — DR Secondary"

          - script: |
              cd openshiftbaremetal-dr
              terraform ${{ parameters.terraformAction }} \
                -var-file=terraform.tfvars \
                -var-file=vm-migration.tfvars \
                -var enable_vm_migration=true \
                -var source_provider_type=${{ parameters.sourceProviderType }} \
                -var source_provider_name=${{ parameters.sourceProviderName }} \
                -var source_provider_url="${{ parameters.sourceProviderUrl }}" \
                -var migration_type=${{ parameters.migrationType }} \
                -var migration_start_immediately=${{ parameters.migrationStartImmediately }} \
                -var migration_cutover_datetime="${{ parameters.migrationCutoverDatetime }}" \
                -var migration_preserve_static_ips=${{ parameters.preserveStaticIPs }} \
                -var migration_preserve_mac_addresses=${{ parameters.preserveMACAddresses }} \
                -var migration_max_concurrent_vms=${{ parameters.maxConcurrentVMs }} \
                -var migration_max_concurrent_disks_per_vm=${{ parameters.maxConcurrentDisksPerVM }} \
                -input=false \
                $(if [ "${{ parameters.terraformAction }}" = "apply" ] || [ "${{ parameters.terraformAction }}" = "destroy" ]; then echo "-auto-approve"; fi)
            displayName: "Terraform ${{ parameters.terraformAction }} — DR Secondary Migration"
            env:
              TF_VAR_source_provider_username: $(source-provider-username)
              TF_VAR_source_provider_password: $(source-provider-password)
              TF_VAR_source_provider_thumbprint: $(source-provider-thumbprint)

  # =====================================================================
  # Post-Migration Summary
  # =====================================================================
  - stage: Summary
    displayName: "Migration Summary"
    dependsOn:
      - ${{ if eq(parameters.deploymentScope, 'dc-only') }}:
          - Migration_DC_Primary
      - ${{ if eq(parameters.deploymentScope, 'dr-only') }}:
          - Migration_DR_Secondary
    condition: succeeded()
    jobs:
      - job: PrintSummary
        displayName: "Migration Summary"
        pool:
          name: "self-hosted-linux"
        steps:
          - script: |
              echo "========================================"
              echo "VM Migration Deployment"
              echo "========================================"
              echo "Scope:              ${{ parameters.deploymentScope }}"
              echo "Action:             ${{ parameters.terraformAction }}"
              echo "Source Platform:    ${{ parameters.sourceProviderType }}"
              echo "Source Provider:    ${{ parameters.sourceProviderName }}"
              echo "Migration Type:    ${{ parameters.migrationType }}"
              echo "Start Immediately: ${{ parameters.migrationStartImmediately }}"
              echo "Preserve IPs:      ${{ parameters.preserveStaticIPs }}"
              echo "Preserve MACs:     ${{ parameters.preserveMACAddresses }}"
              echo "Max Concurrent:    ${{ parameters.maxConcurrentVMs }} VMs"
              echo "========================================"
            displayName: "Print Summary"
